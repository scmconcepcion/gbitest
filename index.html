<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBI | Global Innovation Inc.</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <span class="gbi">GBI</span>
    <div>
      <p>株式会社</p>
      <h1>グローバルイノベーション</h1>
    </div>
  </div>

  <div class="menu">
    ☰
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Global Innovation Inc.</h2>
    <p>ITで業務効率を最大化</p>
    <a href="#contact" class="btn">無料相談はこちら</a>
  </div>

  <div class="hero-image">
    <img src="images/hero.png" alt="team">
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h3>サービス</h3>

  <div class="services">
    <div class="card">
      <h4>Web制作</h4>
      <p>企業サイト・LP制作</p>
    </div>

    <div class="card">
      <h4>ネットワーク</h4>
      <p>構築・セキュリティ対策</p>
    </div>

    <div class="card">
      <h4>ITサポート</h4>
      <p>日常業務の支援</p>
    </div>

    <div class="card">
      <h4>ITコンサル</h4>
      <p>DX・業務改善</p>
    </div>
  </div>
</section>

<!-- CTA -->
<section id="contact" class="cta">
  <h3>お気軽にご相談ください</h3>
  <p>お問い合わせはフォームまたはお電話で</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© GBI Co., Ltd.</p>
</footer>

</body>
</html>
