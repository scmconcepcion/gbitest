<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBI | Global Innovation Inc.</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="header-inner">

    <nav class="nav">
      <a href="#"><i class="fas fa-home"></i> TOP</a>
      <a href="#"><i class="fas fa-user"></i> 代表挨拶</a>
      <a href="#"><i class="fas fa-book"></i> 経営方針</a>
      <a href="#"><i class="fas fa-briefcase"></i> 事業内容</a>
      <a href="#"><i class="fas fa-comments"></i> 社員の声</a>
      <a href="#"><i class="fas fa-user-plus"></i> 採用情報</a>
      <a href="#"><i class="fas fa-building"></i> 会社概要</a>
      <a href="#contact"><i class="fas fa-envelope"></i> お問い合わせ</a>
    </nav>

    <div class="phone">
      <i class="fas fa-phone"></i> 098-917-5572
    </div>

  </div>

</header>

<!-- HERO -->
<section class="hero">

  <div class="hero-inner">

    <p class="company-small">株式会社</p>
    <h1 class="company-name">グローバルイノベーション</h1>

    <p class="tagline">
      ITで未来を創る企業<br>
      システム開発・ネットワーク構築・DX支援で<br>
      ビジネスの成長をサポートします。
    </p>

    <a href="#contact" class="btn-primary">お問い合わせ</a>

  </div>

</section>

<!-- TEAM IMAGE -->
<section class="hero-image">
  <img src="./images/top_gbi.png" alt="GBI team">
</section>

<!-- CONTACT -->
<section id="contact" class="contact">

  <div class="contact-inner">
    <h2>お問い合わせ</h2>

    <form>
      <input type="text" placeholder="会社名">
      <input type="email" placeholder="メール">
      <textarea placeholder="内容"></textarea>

      <button type="submit">送信</button>
    </form>
  </div>

</section>

</body>
</html>
